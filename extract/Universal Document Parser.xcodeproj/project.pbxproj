		D1037FAB2F80EEAC0026408F /* Export tokenizer */ = {
			isa = PBXShellScriptBuildPhase;
			buildActionMask = 2147483647;
			files = (
			);
			inputFileListPaths = (
			);
			inputPaths = (
			);
			name = "Export tokenizer";
			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "if test \"$CONFIGURATION\" == '***'; then\n\nset -e\n\nOUTPUT=\"$PROJECT_DIR/include/embed_tokenizer.h\"\n\n# Define tokenizers as parallel arrays\n# FORMAT: \"relative/path/to/tokenizer.json|symbol_prefix\"\nTOKENIZERS=(\n    \"microsoft/harrier-oss-v1-0.6b/tokenizer.json|qwen3_0_6b\"\n    \"microsoft/harrier-oss-v1-270m/tokenizer.json|qwen3_270m\"\n)\n\n# Check if any input is newer than output\nNEEDS_REBUILD=0\nif [ ! -f \"$OUTPUT\" ]; then\n    NEEDS_REBUILD=1\nelse\n    for ENTRY in \"${TOKENIZERS[@]}\"; do\n        INPUT=\"$PROJECT_DIR/tokenizers/${ENTRY%%|*}\"\n        if [ \"$INPUT\" -nt \"$OUTPUT\" ]; then\n            NEEDS_REBUILD=1\n            break\n        fi\n    done\nfi\n\nif [ \"$NEEDS_REBUILD\" -eq 0 ]; then\n    echo \"embed_tokenizer.h is up to date, skipping.\"\n    exit 0\nfi\n\nmkdir -p \"$PROJECT_DIR/include\"\n\n{\n    echo \"/* Auto-generated by embed_tokenizer.sh — do not edit */\"\n    echo \"#pragma once\"\n    echo \"#include <stddef.h>\"\n\n    for ENTRY in \"${TOKENIZERS[@]}\"; do\n        INPUT=\"$PROJECT_DIR/tokenizers/${ENTRY%%|*}\"\n        SYMBOL=\"${ENTRY##*|}\"\n\n        if [ ! -f \"$INPUT\" ]; then\n            echo \"WARNING: tokenizer not found, skipping: $INPUT\" >&2\n            continue\n        fi\n\n        LENGTH=$(wc -c < \"$INPUT\" | tr -d ' ')\n\n        echo \"\"\n        echo \"/* ${ENTRY%%|*} */\"\n        echo \"static const unsigned char ${SYMBOL}_tokenizer_json[] = {\"\n        xxd -i < \"$INPUT\" | grep -v 'unsigned' | grep -v '};' | grep -v '^$'\n        echo \"};\"\n        echo \"static const size_t ${SYMBOL}_tokenizer_json_len = ${LENGTH};\"\n\n        echo \"Embedded: ${ENTRY%%|*} as ${SYMBOL} (${LENGTH} bytes)\" >&2\n    done\n\n} > \"$OUTPUT\"\n\necho \"Generated $OUTPUT\"\n\nfi\n";
		};
